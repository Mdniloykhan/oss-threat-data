name: Evaluate Dataset
on:
  push:
    paths:
      - 'data/**'
      - 'scripts/**'
  pull_request:
    paths:
      - 'data/**'
      - 'scripts/**'

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas scikit-learn matplotlib seaborn requests tqdm

      - name: Run dataset evaluation
        run: python scripts/evaluate.py

      - name: Run baseline experiments
        run: python scripts/baseline_experiments.py
