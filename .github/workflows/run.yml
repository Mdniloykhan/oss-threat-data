name: Run Baseline Models
on:
  push:
    branches: ["main"]

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pandas scikit-learn matplotlib seaborn requests tqdm

      - name: Create results directory
        run: mkdir -p results

      - name: Run baseline experiments
        run: python scripts/baseline_experiments.py

      - name: Move output files to results
        run: |
          mv confusion_matrix_baseline.png results/ 2>/dev/null || true
          mv method_comparison.png results/ 2>/dev/null || true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: experiment-results
          path: results/
