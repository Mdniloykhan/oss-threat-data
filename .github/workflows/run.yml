cat > .github/workflows/run.yml << 'EOF'
name: Run Baseline Models
on:
  push:
    branches: ["main"]

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pandas scikit-learn matplotlib seaborn requests tqdm

      - name: Run baseline experiments
        run: python scripts/baseline_final.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: experiment-results
          path: |
            confusion_matrix_baseline.png
            method_comparison.png
            opensource_llm_results.csv
EOF
